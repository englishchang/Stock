name: 每日更新期交所數據

on:
  schedule:
    # 週一至週五 台北時間 16:30（UTC 08:30）盤後自動執行
    - cron: "30 8 * * 1-5"
  workflow_dispatch:   # 允許手動觸發

permissions:
  contents: write      # 寫入 data.json
  pages: write         # 部署 GitHub Pages
  id-token: write

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 抓取期交所數據
        run: python scripts/fetch_taifex.py

      - name: 顯示抓到的數據
        run: cat data.json

      - name: Commit data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "chore: 自動更新期交所數據 $(date +'%Y/%m/%d %H:%M') [skip ci]"
          git push

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
