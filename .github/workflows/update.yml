name: 更新期交所 + 加密貨幣數據

on:
  schedule:
    # 加密貨幣：每4小時（UTC 0/4/8/12/16/20點）
    - cron: "0 0,4,8,12,16,20 * * *"
    # 台股期貨：週一至週五 台北時間 17:00（UTC 09:00）
    - cron: "0 9 * * 1-5"
  workflow_dispatch:
    inputs:
      mode:
        description: '執行模式'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - crypto_only
          - taifex_only

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安裝工具
        run: sudo apt-get install -y wget

      # 加密貨幣（每次都跑）
      - name: 抓取 BTC / DOGE 數據
        if: github.event.inputs.mode != 'taifex_only'
        run: python scripts/fetch_crypto.py

      # 台股期貨（只在 09:00 UTC 週一至週五，或手動指定時跑）
      - name: 判斷是否需要抓台股期貨
        id: check_taifex
        run: |
          HOUR=$(date -u +%H)
          WDAY=$(date -u +%u)
          MODE="${{ github.event.inputs.mode }}"
          if [[ "$MODE" == "taifex_only" || "$MODE" == "all" || \
               ("$HOUR" == "09" && "$WDAY" -le 5) ]]; then
            echo "run=true" >> $GITHUB_OUTPUT
          else
            echo "run=false" >> $GITHUB_OUTPUT
          fi

      - name: 抓取期交所數據（含重試）
        if: steps.check_taifex.outputs.run == 'true'
        id: fetch_taifex
        run: python scripts/fetch_taifex.py
        continue-on-error: true

      - name: 若失敗等待後重試
        if: steps.fetch_taifex.outcome == 'failure'
        run: |
          echo "30 秒後重試..."
          sleep 30
          python scripts/fetch_taifex.py

      - name: 顯示最新數據
        run: cat data.json

      - name: Commit & Push data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet && echo "無變更，跳過 commit" && exit 0
          git commit -m "chore: 自動更新數據 $(date +'%Y/%m/%d %H:%M UTC') [skip ci]"
          # pull --rebase 防止並發衝突
          git pull --rebase origin main
          git push

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
