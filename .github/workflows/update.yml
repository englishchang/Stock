name: 每日更新期交所數據

on:
  schedule:
    # 週一至週五 台北時間 17:00（UTC 09:00）
    - cron: "0 9 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安裝 wget
        run: sudo apt-get install -y wget

      - name: 抓取期交所數據（最多重試 3 次）
        id: fetch
        run: python scripts/fetch_taifex.py
        continue-on-error: true

      - name: 若失敗等待後再試
        if: steps.fetch.outcome == 'failure'
        run: |
          echo "第一次失敗，等待 30 秒後重試..."
          sleep 30
          python scripts/fetch_taifex.py

      - name: 顯示抓到的數據
        run: cat data.json

      - name: Commit data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "chore: 自動更新期交所數據 $(date +'%Y/%m/%d %H:%M') [skip ci]"
          git push

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
